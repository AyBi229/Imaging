<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Attribute Editor — WooCommerce Pipeline</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/attribute-editor.css">
</head>
<body>

    <div class="page-nav">
        <a href="/index.html">← Back to Image Pipeline</a>
    </div>

    <h2>Product Attribute Editor</h2>

    <!-- MODULE: SKU Lookup -->
    <div class="attr-lookup-section">
        <h3>Look Up Grouped Product by SKU</h3>
        <p>Enter a grouped product SKU. The app will find its category and load the attributes assigned to it.</p>
        <div class="attr-lookup-row">
            <input
                type="text"
                id="attrSkuInput"
                placeholder="e.g. GRP-TC5A-2SC1B"
                autocomplete="off"
                spellcheck="false"
            >
            <button id="attrLookupBtn">Look up</button>
        </div>
        <div id="attrStatus"></div>
    </div>

    <!-- Product meta strip (shown after lookup) -->
    <div id="productMeta"></div>

    <!-- Children + parent section (injected by JS) -->
    <div id="childrenSection"></div>

    <script src="/js/shared.js"></script>
    <script src="/js/attributeEditor.js"></script>
</body>
</html>
